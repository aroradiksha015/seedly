name: seedlyDeployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: gitcode
        uses: actions/checkout@v4
      - name: connection
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{secrets.IP}}
          username: ${{secrets.USERNAME}}
          key: ${{secrets.PEM_KEY}}

          script: |
            cd /home/ubuntu/seedly_backend
            git pull origin main
            sudo npm install
            sudo npm run build
            pm2 restart backend || pm2 start index.js --name "Backend"
            pm2 save
